<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FutureWay - แชท</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/chat.css">
</head>
<body>

  <!-- Header -->
  <header class="chat-header">
    <span class="page-title">แชท</span>
  </header>

  <!-- Quick chips บนสุด -->
  <div class="chip-bar-top">
    <button class="chip" onclick="sendChip(this)">สาขาที่เรียนของฉันคืออะไร ?</button>
    <button class="chip" onclick="sendChip(this)">แนะนำมหาวิทยาลัย</button>
    <button class="chip" onclick="sendChip(this)">อาชีพที่เหมาะกับฉัน</button>
  </div>

  <!-- พื้นที่แชท -->
  <div class="chat-body" id="chat-body">
    <div class="bubble-ai">
      <div class="ai-icon"><i class="fas fa-robot"></i></div>
      <div class="ai-text">สวัสดีครับ! ผมช่วยแนะนำสาขาการเรียนและมหาวิทยาลัยที่เหมาะกับคุณได้เลย ลองถามผมดูนะครับ 😊</div>
    </div>
  </div>

  <!-- Quick chips ล่าง -->
  <div class="chip-bar-bottom">
    <button class="chip" onclick="sendChip(this)">สาขาที่เรียนของฉันคืออะไร ?</button>
    <button class="chip" onclick="sendChip(this)">มหาลัยของฉันคืออะไร</button>
    <button class="chip" onclick="sendChip(this)">ค่าใช้จ่าย</button>
  </div>

  <!-- Input bar -->
  <div class="chat-input-bar">
    <div class="chat-input-wrap">
      <input type="text" id="chat-input" placeholder="พิมพ์ข้อความ..." autocomplete="off">
    </div>
    <button class="send-btn" onclick="sendMessage()">
      <i class="fas fa-paper-plane"></i>
    </button>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="main.html" class="nav-item">
      <i class="fas fa-home"></i>
      <span>หน้าหลัก</span>
    </a>
    <a href="History_Results.html" class="nav-item">
      <i class="fas fa-chart-bar"></i>
      <span>ประวัติผลลัพธ์</span>
    </a>
    <a href="chat.html" class="nav-item active">
      <div class="icon-circle">
        <i class="fas fa-comment-dots"></i>
      </div>
      <span>แชท</span>
    </a>
    <a href="profile.html" class="nav-item">
      <i class="fas fa-user-cog"></i>
      <span>การตั้งค่า</span>
    </a>
  </nav>

  <script>
    const history = [];

    const SYSTEM_PROMPT = `คุณคือผู้ช่วยแนะนำสาขาการเรียนและมหาวิทยาลัยในประเทศไทย ชื่อ "FutureWay AI"
ตอบเป็นภาษาไทยเสมอ ตอบกระชับ ชัดเจน เป็นมิตร
ช่วยแนะนำสาขาวิชา มหาวิทยาลัย อาชีพ และค่าใช้จ่ายที่เกี่ยวข้อง
ถ้าผู้ใช้ถามเรื่องอื่นที่ไม่เกี่ยวข้อง ให้แนะนำกลับมาที่หัวข้อการศึกษาอย่างสุภาพ`;

    async function sendMessage() {
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      appendMessage('user', text);
      await callAI(text);
    }

    function sendChip(btn) {
      const text = btn.textContent.trim();
      appendMessage('user', text);
      callAI(text);
    }

    function appendMessage(role, text) {
      const body = document.getElementById('chat-body');
      const div = document.createElement('div');
      if (role === 'user') {
        div.className = 'bubble-user';
        div.textContent = text;
        history.push({ role: 'user', content: text });
      } else {
        div.className = 'bubble-ai';
        div.innerHTML = `
          <div class="ai-icon"><i class="fas fa-robot"></i></div>
          <div class="ai-text">${text}</div>`;
        history.push({ role: 'assistant', content: text });
      }
      body.appendChild(div);
      body.scrollTop = body.scrollHeight;
    }

    function showTyping() {
      const body = document.getElementById('chat-body');
      const div = document.createElement('div');
      div.className = 'bubble-ai';
      div.id = 'typing-indicator';
      div.innerHTML = `
        <div class="ai-icon"><i class="fas fa-robot"></i></div>
        <div class="ai-text">
          <div class="typing-dots">
            <span></span><span></span><span></span>
          </div>
        </div>`;
      body.appendChild(div);
      body.scrollTop = body.scrollHeight;
    }

    function removeTyping() {
      const el = document.getElementById('typing-indicator');
      if (el) el.remove();
    }

    async function callAI(userText) {
      showTyping();
      try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': 'YOUR_API_KEY_HERE',      // ← ใส่ API Key ตรงนี้
            'anthropic-version': '2023-06-01'
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1000,
            system: SYSTEM_PROMPT,
            messages: history.filter(m => m.role === 'user' || m.role === 'assistant')
          })
        });
        const data = await response.json();
        removeTyping();
        if (data.content && data.content[0]) {
          appendMessage('assistant', data.content[0].text);
        } else {
          appendMessage('assistant', 'ขออภัยครับ เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง');
        }
      } catch (err) {
        removeTyping();
        appendMessage('assistant', 'ขออภัยครับ ไม่สามารถเชื่อมต่อได้ในขณะนี้');
      }
    }

    document.getElementById('chat-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendMessage();
    });
  </script>

</body>
</html>
