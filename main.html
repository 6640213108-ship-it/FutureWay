<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FutureWay</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- Header: ทักทาย + รูปโปรไฟล์ -->
  <header class="app-header">
    <span id="welcome-text" class="welcome-text">กำลังโหลด...</span>
    <img src="images/account_circle_24dp_1F1F1F_FILL0_wght400_GRAD0_opsz24.png" alt="Profile" class="profile-pic">
  </header>

  <!-- เนื้อหาหลัก -->
  <main class="app-content">

    <!-- กล่องขาวหลัก -->
    <div class="white-card">
      <img src="images/banner.jpg" alt="Welcome" class="card-banner">
      <a href="#" class="link-title">รายชื่อมหาวิทยาลัยและสถาบันต่าง ๆ ที่เปิดรับสมัคร</a>
      <div class="blue-badge">ข้อมูลการรับสมัครของมหาวิทยาลัย ปีการศึกษา 2569</div>

      <a href="quiz.html" >
      <button class="test-btn">คลิ๊ก.. เพื่อทำแบบทดสอบ </button>
      </a>

    </div>

    <!-- กล่องสไลด์รูปภาพด้านล่าง -->
    <div class="info-scroll">
      <img src="images/tcas1.jpg" alt="Info 1" class="info-img">
      <img src="images/tcas2.jpg" alt="Info 2" class="info-img">
    </div>

  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="#" class="nav-item active">
      <div class="icon-circle">
        <i class="fas fa-home"></i>
      </div>
      <span>หน้าหลัก</span>
    </a>
    <a href="History_Results.html" class="nav-item">
      <i class="fas fa-chart-bar"></i>
      <span>ประวัติ/ผลลัพธ์</span>
    </a>
    <a href="chat.html" class="nav-item">
      <i class="fas fa-comment-dots"></i>
      <span>แชท</span>
    </a>
    <a href="profile.html" class="nav-item">
      <i class="fas fa-user-cog"></i>
      <span>การตั้งค่า</span>
    </a>
  </nav>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      fetch('php/get_user.php', { cache: 'no-store' })
        .then(r => r.json())
        .then(data => {
          const el = document.getElementById('welcome-text');
          el.innerHTML = data.success ? 'สวัสดี, ' + data.fullname : 'กรุณาเข้าสู่ระบบ';
        })
        .catch(() => {
          document.getElementById('welcome-text').innerHTML = 'ข้อผิดพลาด';
        });
    });
  </script>

</body>
</html>
