<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FutureWay - แบบทดสอบ</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/quiz.css">
</head>
<body>

  <!-- Header -->
  <header class="back-header">
    <a href="main.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <span class="page-title">ค้นหาตัวเอง</span>
  </header>

  <!-- Step Progress Bar -->
  <div class="step-bar">
    <div class="step active" id="step1">
      <div class="step-circle">1</div>
      <span class="step-label">กรอกเกรด</span>
    </div>
    <div class="step-line" id="line1"></div>
    <div class="step" id="step2">
      <div class="step-circle">2</div>
      <span class="step-label">แบบทดสอบ</span>
    </div>
  </div>

  <!-- ===== SECTION 1: กรอกเกรด ===== -->
  <div id="section-grade">
    <div class="quiz-content">
      <p class="quiz-section-title">📝 กรอกเกรดวิชาของคุณ</p>

      <div class="grade-card">

        <div class="grade-row">
          <div class="grade-subject">
            <div class="subject-icon math"><i class="fas fa-square-root-alt"></i></div>
            <span class="subject-name">คณิตศาสตร์</span>
          </div>
          <input class="grade-input" type="number" id="g-math" min="0" max="4" step="0.01" placeholder="0.00">
        </div>

        <div class="grade-row">
          <div class="grade-subject">
            <div class="subject-icon sci"><i class="fas fa-flask"></i></div>
            <span class="subject-name">วิทยาศาสตร์</span>
          </div>
          <input class="grade-input" type="number" id="g-sci" min="0" max="4" step="0.01" placeholder="0.00">
        </div>

        <div class="grade-row">
          <div class="grade-subject">
            <div class="subject-icon eng"><i class="fas fa-language"></i></div>
            <span class="subject-name">ภาษาอังกฤษ</span>
          </div>
          <input class="grade-input" type="number" id="g-eng" min="0" max="4" step="0.01" placeholder="0.00">
        </div>

        <div class="grade-row">
          <div class="grade-subject">
            <div class="subject-icon thai"><i class="fas fa-book"></i></div>
            <span class="subject-name">ภาษาไทย</span>
          </div>
          <input class="grade-input" type="number" id="g-thai" min="0" max="4" step="0.01" placeholder="0.00">
        </div>

        <div class="grade-row">
          <div class="grade-subject">
            <div class="subject-icon social"><i class="fas fa-globe-asia"></i></div>
            <span class="subject-name">สังคมศึกษา</span>
          </div>
          <input class="grade-input" type="number" id="g-social" min="0" max="4" step="0.01" placeholder="0.00">
        </div>

        <div class="grade-row">
          <div class="grade-subject">
            <div class="subject-icon art"><i class="fas fa-paint-brush"></i></div>
            <span class="subject-name">ศิลปะ</span>
          </div>
          <input class="grade-input" type="number" id="g-art" min="0" max="4" step="0.01" placeholder="0.00">
        </div>

      </div>

      <p class="error-msg" id="grade-error">⚠️ กรุณากรอกเกรดให้ครบทุกวิชา (0.00 - 4.00)</p>
    </div>

    <div class="quiz-submit-wrap">
      <button class="quiz-next-btn" onclick="goToMBTI()">ถัดไป → ทำแบบทดสอบ</button>
    </div>
  </div>

  <!-- ===== SECTION 2: MBTI ===== -->
  <div id="section-mbti" style="display:none;">
    <div class="quiz-content">
      <p class="quiz-section-title">🧠 แบบทดสอบบุคลิกภาพ MBTI</p>

      <!-- ⭐ คำถามจะถูกดึงจาก DB มาแสดงตรงนี้แทนของ hardcode เดิม -->
      <div id="mbti-questions-container">
        <p style="text-align:center;padding:20px;">กำลังโหลดคำถาม...</p>
      </div>

      <p class="error-msg" id="mbti-error">⚠️ กรุณาตอบทุกข้อให้ครบ</p>
    </div>

    <div class="quiz-submit-wrap">
      <button class="quiz-submit-btn" onclick="submitQuiz()">
        <i class="fas fa-paper-plane"></i> ดูผลลัพธ์
      </button>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="main.html" class="nav-item">
      <i class="fas fa-home"></i>
      <span>หน้าหลัก</span>
    </a>
    <a href="#" class="nav-item active">
      <div class="icon-circle">
        <i class="fas fa-chart-bar"></i>
      </div>
      <span>ประวัติผลลัพธ์</span>
    </a>
    <a href="chat.html" class="nav-item">
      <i class="fas fa-comment-dots"></i>
      <span>แชท</span>
    </a>
    <a href="profile.html" class="nav-item">
      <i class="fas fa-user-cog"></i>
      <span>การตั้งค่า</span>
    </a>
  </nav>

  <script>
    // เก็บคำตอบ MBTI แยกต่างหาก (ไม่พึ่ง :checked)
    const answers = {};
    let totalQuestions = 0; // จะถูกตั้งค่าหลังโหลดคำถามจาก DB สำเร็จ

    // กัน HTML injection จากข้อความที่มาจาก DB
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str ?? '';
      return div.innerHTML;
    }

    // ดึงคำถามจาก DB มา render แทนคำถาม hardcode เดิม
    async function loadQuestions() {
      const container = document.getElementById('mbti-questions-container');

      try {
        const res = await fetch('php/get_questions.php', { credentials: 'include' });
        const data = await res.json();

        if (!data.success || !data.questions || data.questions.length === 0) {
          container.innerHTML = '<p class="error-msg show">⚠️ ' + (data.error || 'ไม่สามารถโหลดคำถามได้') + '</p>';
          return;
        }

        totalQuestions = data.questions.length;
        let lastDimension = null;
        let html = '';

        data.questions.forEach((q, index) => {
          const qNum = index + 1;

          if (q.dimension !== lastDimension) {
            html += `
              <div class="dimension-label">
                <span class="dimension-badge">${escapeHtml(q.dimension.charAt(0))} / ${escapeHtml(q.dimension.charAt(1))}</span>
                <span class="dimension-title">${escapeHtml(q.dimension_title)}</span>
              </div>`;
            lastDimension = q.dimension;
          }

          html += `
            <div class="mbti-card">
              <span class="mbti-q-number">ข้อที่ ${qNum} / ${totalQuestions}</span>
              <p class="mbti-q-text">${escapeHtml(q.question_text)}</p>
              <div class="mbti-options">
                <label class="mbti-option" onclick="selectOption(this)">
                  <input type="radio" name="q${qNum}" value="${escapeHtml(q.option_a_value)}">
                  <div class="option-dot"></div>
                  <span class="option-text">${escapeHtml(q.option_a_text)}</span>
                </label>
                <label class="mbti-option" onclick="selectOption(this)">
                  <input type="radio" name="q${qNum}" value="${escapeHtml(q.option_b_value)}">
                  <div class="option-dot"></div>
                  <span class="option-text">${escapeHtml(q.option_b_text)}</span>
                </label>
              </div>
            </div>`;
        });

        container.innerHTML = html;
        document.getElementById('mbti-error').textContent =
          `⚠️ กรุณาตอบทุกข้อให้ครบ ${totalQuestions} ข้อ`;

      } catch (err) {
        container.innerHTML = '<p class="error-msg show">⚠️ เชื่อมต่อเซิร์ฟเวอร์ไม่ได้: ' + escapeHtml(err.message) + '</p>';
      }
    }

    // โหลดคำถามล่วงหน้าตั้งแต่เปิดหน้า
    document.addEventListener('DOMContentLoaded', loadQuestions);

    // เลือก option MBTI
    function selectOption(label) {
      setTimeout(() => {
        const input = label.querySelector('input');
        answers[input.name] = input.value;

        document.querySelectorAll(`input[name="${input.name}"]`).forEach(r => {
          r.closest('.mbti-option').classList.remove('selected');
        });
        label.classList.add('selected');

        const card = label.closest('.mbti-card');
        if (card) card.style.border = '';
      }, 0);
    }

    // ไปหน้า MBTI
    function goToMBTI() {
      const subjects = ['g-math','g-sci','g-eng','g-thai','g-social','g-art'];
      let valid = true;

      subjects.forEach(id => {
        const el = document.getElementById(id);
        const val = parseFloat(el.value);
        if (el.value === '' || isNaN(val) || val < 0 || val > 4) {
          el.classList.add('error');
          valid = false;
        } else {
          el.classList.remove('error');
        }
      });

      if (!valid) {
        document.getElementById('grade-error').classList.add('show');
        return;
      }

      document.getElementById('grade-error').classList.remove('show');
      document.getElementById('section-grade').style.display = 'none';
      document.getElementById('section-mbti').style.display = 'block';

      document.getElementById('step1').classList.remove('active');
      document.getElementById('step1').classList.add('done');
      document.getElementById('step1').querySelector('.step-circle').innerHTML = '<i class="fas fa-check" style="font-size:0.7rem"></i>';
      document.getElementById('line1').classList.add('done');
      document.getElementById('step2').classList.add('active');

      window.scrollTo(0, 0);
    }

    // Submit ทั้งหมด
    function submitQuiz() {
      if (totalQuestions === 0) {
        alert('คำถามยังโหลดไม่เสร็จ กรุณารอสักครู่');
        return;
      }

      const missing = [];
      for (let i = 1; i <= totalQuestions; i++) {
        const card = document.querySelectorAll('.mbti-card')[i - 1];
        if (!answers[`q${i}`]) {
          missing.push(i);
          card.style.border = '2px solid #e74c3c';
          card.style.borderRadius = '16px';
        } else {
          card.style.border = '';
        }
      }

      if (missing.length > 0) {
        const errEl = document.getElementById('mbti-error');
        errEl.textContent = `⚠️ ยังไม่ได้ตอบข้อที่: ${missing.join(', ')}`;
        errEl.classList.add('show');

        const firstMissing = document.querySelectorAll('.mbti-card')[missing[0] - 1];
        firstMissing.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }

      document.getElementById('mbti-error').classList.remove('show');
      document.querySelectorAll('.mbti-card').forEach(c => c.style.border = '');

      const grades = {
        math:   parseFloat(document.getElementById('g-math').value),
        sci:    parseFloat(document.getElementById('g-sci').value),
        eng:    parseFloat(document.getElementById('g-eng').value),
        thai:   parseFloat(document.getElementById('g-thai').value),
        social: parseFloat(document.getElementById('g-social').value),
        art:    parseFloat(document.getElementById('g-art').value),
      };

      const dims = { E:0,I:0, S:0,N:0, T:0,F:0, J:0,P:0 };
      for (let i = 1; i <= totalQuestions; i++) {
        dims[answers[`q${i}`]]++;
      }
      const mbti =
        (dims.E >= dims.I ? 'E' : 'I') +
        (dims.S >= dims.N ? 'S' : 'N') +
        (dims.T >= dims.F ? 'T' : 'F') +
        (dims.J >= dims.P ? 'J' : 'P');

      sessionStorage.setItem('grades', JSON.stringify(grades));
      sessionStorage.setItem('mbti', mbti);

      const btn = document.querySelector('.quiz-submit-btn');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังประมวลผล...';

      fetch('php/save_quiz.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ grades, mbti })
      })
      .then(r => r.json())
      .then(data => {
        if (data.success) {
          window.location.href = 'result.html?id=' + data.result_id;
        } else {
          console.error('PHP error:', data);
          alert('เกิดข้อผิดพลาด: ' + (data.error || 'กรุณาลองใหม่'));
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-paper-plane"></i> ดูผลลัพธ์';
        }
      })
      .catch((err) => {
        console.error('Fetch error:', err);
        alert('ไม่สามารถเชื่อมต่อได้: ' + err.message);
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> ดูผลลัพธ์';
      });
    }
  </script>

</body>
</html>
