<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FutureWay - ผลลัพธ์</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
  <style>
    /* Result Page Styles */
    .result-hero {
      background: linear-gradient(160deg, #9b30f0 0%, #6a0dad 50%, #4a0080 100%);
      padding: 32px 20px 40px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .result-hero::before {
      content: '';
      position: absolute;
      bottom: -40px; right: -40px;
      width: 200px; height: 200px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
    }
    .result-hero-label {
      color: rgba(255,255,255,0.75);
      font-size: 0.82rem;
      margin-bottom: 6px;
    }
    .mbti-badge {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.4);
      color: #fff;
      font-size: 2rem;
      font-weight: 700;
      padding: 8px 28px;
      border-radius: 40px;
      letter-spacing: 6px;
      margin-bottom: 10px;
    }
    .result-hero-sub {
      color: rgba(255,255,255,0.8);
      font-size: 0.82rem;
    }

    .result-content {
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .result-section-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }

    /* rank card */
    .rank-card {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 3px 14px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .rank-badge {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .rank-badge.gold   { background: linear-gradient(135deg, #f6d365, #e8a020); }
    .rank-badge.silver { background: linear-gradient(135deg, #c0c0c0, #909090); }
    .rank-badge.bronze { background: linear-gradient(135deg, #cd7f32, #a0522d); }

    .rank-info { flex: 1; }
    .rank-name    { font-size: 0.95rem; font-weight: 700; color: #1a1a1a; }
    .rank-faculty { font-size: 0.78rem; color: var(--gray); margin-top: 2px; }

    .score-bar-wrap { margin-top: 8px; }
    .score-bar-bg {
      height: 6px;
      background: #f0f0f5;
      border-radius: 10px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 10px;
      background: linear-gradient(90deg, #9b30f0, #7b2ff7);
      transition: width 1s ease;
    }
    .score-text {
      font-size: 0.72rem;
      color: var(--gray);
      margin-top: 4px;
      text-align: right;
    }

    /* grade summary */
    .grade-summary {
      background: #fff;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 3px 14px rgba(0,0,0,0.08);
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .grade-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #f5f5fb;
      border-radius: 20px;
      padding: 5px 12px;
      font-size: 0.78rem;
    }
    .grade-chip span { color: var(--primary); font-weight: 700; }

    /* loading */
    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 14px;
    }
    .loading-spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(123,47,247,0.2);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--gray); font-size: 0.88rem; }

    .error-wrap {
      text-align: center;
      padding: 40px 20px;
      color: var(--red);
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="back-header">
    <a href="quiz.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
    <span class="page-title">ผลลัพธ์ของคุณ</span>
  </header>

  <!-- Loading -->
  <div id="loading-wrap" class="loading-wrap">
    <div class="loading-spinner"></div>
    <p class="loading-text">กำลังวิเคราะห์ข้อมูล...</p>
  </div>

  <!-- Result (ซ่อนไว้ก่อน) -->
  <div id="result-wrap" style="display:none;">

    <!-- Hero MBTI -->
    <div class="result-hero">
      <p class="result-hero-label">บุคลิกภาพของคุณคือ</p>
      <div class="mbti-badge" id="mbti-display">—</div>
      <p class="result-hero-sub" id="avg-grade-display"></p>
    </div>

    <div class="result-content">

      <!-- Top 3 สาขา -->
      <p class="result-section-title">🎯 สาขาที่เหมาะกับคุณ</p>
      <div id="rank-list" style="display:flex; flex-direction:column; gap:10px;"></div>

      <!-- สรุปเกรด -->
      <p class="result-section-title">📊 เกรดของคุณ</p>
      <div class="grade-summary" id="grade-summary"></div>

      <!-- ปุ่มทำใหม่ -->
      <a href="quiz.html" style="
        display:block; text-align:center;
        padding: 14px;
        background: #f0f0f5;
        border-radius: 14px;
        color: var(--primary);
        font-weight: 700;
        font-size: 0.9rem;
        text-decoration: none;
        margin-bottom: 8px;
      ">
        <i class="fas fa-redo"></i> ทำแบบทดสอบใหม่
      </a>

    </div>
  </div>

  <!-- Error -->
  <div id="error-wrap" class="error-wrap" style="display:none;">
    <i class="fas fa-exclamation-circle" style="font-size:2rem; margin-bottom:10px;"></i>
    <p id="error-msg">เกิดข้อผิดพลาด</p>
    <a href="quiz.html" style="color:var(--primary); margin-top:12px; display:inline-block;">
      ← กลับไปทำใหม่
    </a>
  </div>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="main.html" class="nav-item">
      <i class="fas fa-home"></i>
      <span>หน้าหลัก</span>
    </a>
    <a href="#" class="nav-item active">
      <div class="icon-circle">
        <i class="fas fa-chart-bar"></i>
      </div>
      <span>ประวัติผลลัพธ์</span>
    </a>
    <a href="chat.html" class="nav-item">
      <i class="fas fa-comment-dots"></i>
      <span>แชท</span>
    </a>
    <a href="profile.html" class="nav-item">
      <i class="fas fa-user-cog"></i>
      <span>การตั้งค่า</span>
    </a>
  </nav>

  <script>
    const GRADE_LABELS = {
      math: 'คณิตศาสตร์', sci: 'วิทยาศาสตร์',
      eng: 'อังกฤษ', thai: 'ไทย',
      social: 'สังคม', art: 'ศิลปะ'
    };
    const RANK_STYLES = [
      { cls: 'gold',   label: '🥇' },
      { cls: 'silver', label: '🥈' },
      { cls: 'bronze', label: '🥉' },
    ];

    // ดึง result_id จาก URL
    const params   = new URLSearchParams(window.location.search);
    const resultId = params.get('id');

    if (!resultId) {
      showError('ไม่พบ result_id กรุณาทำแบบทดสอบใหม่');
    } else {
      fetch(`php/get_result.php?id=${resultId}`)
        .then(r => r.json())
        .then(data => {
          if (!data.success) {
            showError(data.error || 'ไม่พบข้อมูล');
            return;
          }
          renderResult(data);
        })
        .catch(() => showError('ไม่สามารถเชื่อมต่อได้'));
    }

    function renderResult(data) {
      // MBTI
      document.getElementById('mbti-display').textContent     = data.mbti;
      document.getElementById('avg-grade-display').textContent =
        `เกรดเฉลี่ย ${data.avg_grade} | วิเคราะห์จาก 6 วิชาหลัก`;

      // Top 3 สาขา
      const rankList = document.getElementById('rank-list');
      data.top3.forEach((branch, i) => {
        const style = RANK_STYLES[i];
        const card  = document.createElement('div');
        card.className = 'rank-card';
        card.innerHTML = `
          <div class="rank-badge ${style.cls}">${style.label}</div>
          <div class="rank-info">
            <p class="rank-name">${branch.name}</p>
            <p class="rank-faculty">${branch.faculty}</p>
            <div class="score-bar-wrap">
              <div class="score-bar-bg">
                <div class="score-bar-fill" style="width:0%" data-score="${branch.score}"></div>
              </div>
              <p class="score-text">ความเหมาะสม ${branch.score}%</p>
            </div>
          </div>`;
        rankList.appendChild(card);
      });

      // animate score bar
      setTimeout(() => {
        document.querySelectorAll('.score-bar-fill').forEach(el => {
          el.style.width = el.dataset.score + '%';
        });
      }, 300);

      // Grade Summary
      const gradeWrap = document.getElementById('grade-summary');
      Object.entries(data.grades).forEach(([key, val]) => {
        const chip = document.createElement('div');
        chip.className = 'grade-chip';
        chip.innerHTML = `${GRADE_LABELS[key]}: <span>${parseFloat(val).toFixed(2)}</span>`;
        gradeWrap.appendChild(chip);
      });

      // แสดงผล
      document.getElementById('loading-wrap').style.display = 'none';
      document.getElementById('result-wrap').style.display  = 'block';
    }

    function showError(msg) {
      document.getElementById('loading-wrap').style.display = 'none';
      document.getElementById('error-wrap').style.display   = 'block';
      document.getElementById('error-msg').textContent      = msg;
    }
  </script>

</body>
</html>
